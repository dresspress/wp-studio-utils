name: Sync GitHub Metadata

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  sync-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync description to GitHub
        run: |
          TARGET_DESC=$(jq -r '.description' package.json)
          CURRENT_DESC=$(gh repo view ${{ github.repository }} --json description -q .description)

          echo "Current: $CURRENT_DESC"
          echo "Target:  $TARGET_DESC"

          if [ "$CURRENT_DESC" != "$TARGET_DESC" ]; then
            echo "Updating GitHub description..."
            gh repo edit ${{ github.repository }} --description "$TARGET_DESC"
          else
            echo "Already up to date."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
