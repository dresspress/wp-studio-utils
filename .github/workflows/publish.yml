name: Publish to NPM

# Standard top-level permissions for OIDC
permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Publish to npm with trusted publishing
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: npm publish --access public --provenance
      - name: Publish to npm with NPM token
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  sync-metadata:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync description to GitHub
        run: |
          TARGET_DESC=$(jq -r '.description' package.json)
          CURRENT_DESC=$(gh repo view ${{ github.repository }} --json description -q .description)
          
          echo "Current: $CURRENT_DESC"
          echo "Target:  $TARGET_DESC"
          
          if [ "$CURRENT_DESC" != "$TARGET_DESC" ]; then
            echo "Updating GitHub description..."
            gh repo edit ${{ github.repository }} --description "$TARGET_DESC"
          else
            echo "Already up to date."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
