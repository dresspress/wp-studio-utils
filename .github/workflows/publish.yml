name: Publish to NPM

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      
      # Diagnostic Step: Check if GitHub actually issued an OIDC token
      - name: OIDC Diagnostic
        run: |
          echo "=== OIDC Environment Check ==="
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "✅ OIDC Identity Token URL is present."
          else
            echo "❌ OIDC Identity Token URL is MISSING."
          fi
          echo "Checking registry connectivity..."
          # This should show the org name if OIDC is working
          npm whoami --registry https://registry.npmjs.org || echo "NPM reports: Not authenticated."
          echo "=============================="

      - run: npm publish --access public
      
  sync-metadata:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync description to GitHub
        run: |
          TARGET_DESC=$(jq -r '.description' package.json)
          CURRENT_DESC=$(gh repo view ${{ github.repository }} --json description -q .description)
          
          if [ "$CURRENT_DESC" != "$TARGET_DESC" ]; then
            gh repo edit ${{ github.repository }} --description "$TARGET_DESC"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
